strategy: "non_autonomous_rollout"
evaders:
  - strategy: "random"
    starting_position: [9, 0, 1]
  - strategy: "random"
    starting_position: [10, 19, 1]
pursuers:
  - strategy: "greedy"
    starting_position: [9, 9, 1]
  - strategy: "greedy"
    starting_position: [10, 9, 1]
  - strategy: "greedy"
    starting_position: [9, 10, 1]
  - strategy: "greedy"
    starting_position: [10, 10, 1]
simulation:
  time_steps: 100
  grid_size: [20, 20, 3]
planner:
  discount_factor: 0.99
  signaling_model_path: "models/signaling_kernel.npz"
  signaling_k: 25
  signaling_sigma: 5.0
  signaling_include_evader_position: true
  signaling_normalize: true
visualization:
  evader_color: "red"
  pursuer_color: "tab:blue"
