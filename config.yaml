strategy: "non_autonomous_rollout"
evaders:
  - strategy: "random"
    starting_position: [0, 0, 3]
  - strategy: "random"
    starting_position: [0, 19, 0]
pursuers:
  - strategy: "greedy"
    starting_position: [19, 0, 2]
  - strategy: "greedy"
    starting_position: [19, 19, 0]
  - strategy: "greedy"
    starting_position: [0, 19, 5]
simulation:
  time_steps: 50
  grid_size: [20, 20, 6]
planner:
  discount_factor: 0.99
  signaling_model_path: "models/signaling_kernel.npz"
  signaling_k: 25
  signaling_sigma: 5.0
  signaling_include_evader_position: true
  signaling_normalize: true
visualization:
  evader_color: "red"
  pursuer_color: "tab:blue"
